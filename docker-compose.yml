version: '3.8'

volumes:
  copaw-data:
    name: copaw-data
  copaw-secrets:
    name: copaw-secrets

services:
  copaw:
    image: agentscope/copaw:latest
    container_name: copaw
    restart: always
    expose:
      - "8088"
    # environment:
    #   - COPAW_AUTH_ENABLED=true
    #   - COPAW_AUTH_USERNAME=admin
    #   - COPAW_AUTH_PASSWORD=yourpassword
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret
    networks:
      - copaw-network

  nginx:
    image: nginx:alpine
    container_name: copaw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - copaw
    networks:
      - copaw-network

networks:
  copaw-network:
    name: copaw-network
